# Build MCUboot alongside SS1 and create primary/secondary image slots.
SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y

# Production signing key. The private key is intentionally gitignored and
# must be provisioned locally/through CI before a production build.
SB_CONFIG_BOOT_SIGNATURE_KEY_FILE="\${APPLICATION_CONFIG_DIR}/keys/ss1_mcuboot_prod_key.pem"
